<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Profile - SignApp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
    <nav>
        <a href="/" class="logo">
            <i class="fa-solid fa-fingerprint"></i>
            <span class="brand-text"><strong>Sign</strong>App</span>
        </a>
        <div class="nav-links">
            <a href="/profile">Profile</a>
            <a href="/logout" class="btn-logout">Logout</a>
        </div>
    </nav>
</header>

<main>
    <div class="card">
        <h1 class="welcome-title">Welcome, {{firstName}}!</h1>
        <p class="profile-email">Your email is: <strong>{{email}}</strong></p>
        <hr>

        <h3 class="section-title">Edit Profile</h3>

        <form id="profileForm" action="/profile" method="POST">
            <label>New First Name:</label>
            <input type="text" name="firstName" value="{{firstName}}" required>

            <label>New Last Name:</label>
            <input type="text" name="lastName" value="{{lastName}}" required>

            <label>New Password (not required):</label>
            <input type="password" name="password">

            <button type="submit">Save Changes</button>
        </form>

        <div id="notification"></div>
    </div>
</main>

<footer>
    &copy; 2026 SignApp.
</footer>

<script>
document.getElementById('profileForm').addEventListener('submit', function(event) {
    event.preventDefault();
    const form = event.target;
    const notifyBox = document.getElementById('notification');
    const formData = new URLSearchParams(new FormData(form));
    fetch('/profile', { method: 'POST', body: formData })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            notifyBox.style.display = 'block';
            notifyBox.style.backgroundColor = '#d4edda';
            notifyBox.style.color = '#155724';
            notifyBox.innerText = 'Changes saved successfully!';
            form.querySelector('input[name="password"]').value = '';
            const newFirstName = form.querySelector('input[name="firstName"]').value;
            document.querySelector('h1').innerText = 'Welcome, ' + newFirstName + '!';
            setTimeout(() => notifyBox.style.display = 'none', 3000);
        }
    })
    .catch(error => console.error('Server communication error:', error));
});
</script>
</body>
</html>
