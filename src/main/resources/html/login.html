<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - SignApp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
    <nav>
        <a href="/" class="logo">
            <i class="fa-solid fa-fingerprint"></i>
            <span class="brand-text"><strong>Sign</strong>App</span>
        </a>
        <div class="nav-links">
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        </div>
    </nav>
</header>

<main>
    <div class="card">
        <h1>Login</h1>
        <form id="loginForm" action="/login" method="POST">
            <label>Email:</label>
            <input type="email" name="email" required>

            <label>Password:</label>
            <input type="password" name="password" required>

            <button type="submit">Login</button>
        </form>

        <div id="notification"></div>
    </div>
</main>

<footer>
    &copy; 2026 SignApp.
</footer>

<script>
document.getElementById('loginForm').addEventListener('submit', function(event) {
    event.preventDefault();
    const form = event.target;
    const notifyBox = document.getElementById('notification');
    const formData = new URLSearchParams(new FormData(form));
    fetch('/login', { method: 'POST', body: formData })
    .then(response => response.json())
    .then(data => {
        notifyBox.style.display = 'block';
        if (data.success) {
            notifyBox.style.backgroundColor = '#d4edda';
            notifyBox.style.color = '#155724';
            notifyBox.innerText = data.message;
            setTimeout(() => window.location.href = '/profile', 1000);
        } else {
            notifyBox.style.backgroundColor = '#f8d7da';
            notifyBox.style.color = '#721c24';
            notifyBox.innerText = data.message;
            form.querySelector('input[name="password"]').value = '';
        }
    })
    .catch(err => console.error(err));
});
</script>
</body>
</html>
