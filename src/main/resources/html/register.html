<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
</head>
<body>
<h1>Registration</h1>

<form action="/register" method="POST">
    <label>First Name:</label><br>
    <input type="text" name="firstName"><br><br>

    <label>Last Name:</label><br>
    <input type="text" name="lastName"><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" required><br><br>

    <label>Password:</label><br>
    <input type="password" name="password" required><br><br>

    <hr>
    <label>Prove you are not a robot:</label><br>
    <img src="/captcha" alt="CAPTCHA" style="border: 1px solid #ccc; margin-bottom: 10px;"><br>
    <input type="text" name="captcha" placeholder="Enter the text from the image" required><br><br>

    <button type="submit">Register</button>
</form>
</body>
</html>
